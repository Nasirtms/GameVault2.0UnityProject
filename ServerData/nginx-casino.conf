server {
    listen 3000;
    listen 443 ssl http2;
    server_name 3.231.201.150;
    
    # SSL Certificate
    ssl_certificate /etc/ssl/certs/3.231.201.150-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/3.231.201.150-selfsigned.key;
    
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    root /var/www/html/casino;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/wasm;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;      

    # CORS headers for WebGL
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;      
    add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;                                                        

    # Fix WebGL%20 URLs - MUST be before other location blocks
    # This catches URLs with encoded space (%20) and rewrites them to /WebGL/
    location ~* "^/WebGL%20/(.*)$" {
        rewrite ^/WebGL%20/(.*)$ /WebGL/$1 last;
        gzip off;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
    
    # Also handle unencoded space (just in case)
    location ~* "^/WebGL /(.*)$" {
        rewrite ^/WebGL /(.*)$ /WebGL/$1 last;
        gzip off;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Handle preflight requests
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";     
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";                                                       
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type "text/plain; charset=utf-8";
            add_header Content-Length 0;
            return 204;
        }

        try_files $uri $uri/ /index.html;
    }


    # WebGL specific MIME types - serve uncompressed files directly
    location ~* \.wasm$ {
        add_header Content-Type "application/wasm";
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "no-cache, no-store, must-revalidate";       
        add_header Pragma "no-cache";
        add_header Expires "0";
        # Ensure proper MIME type is set
        default_type application/wasm;
    }

    location ~* \.data$ {
        add_header Content-Type "application/octet-stream";
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "no-cache, no-store, must-revalidate";       
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # WebGL folder - normal path
    location /WebGL/ {
        gzip off;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Unity AssetBundle files - MUST be served uncompressed (no gzip)
    location ~* \.bundle$ {
        gzip off;
        add_header Content-Type "application/octet-stream" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Encoding "" always;
        try_files $uri =404;
    }

    location ~* \.js$ {
        add_header Content-Type "application/javascript; charset=utf-8";      
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "no-cache, no-store, must-revalidate";       
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # TemplateData files
    location /TemplateData/ {
        add_header Access-Control-Allow-Origin "*";
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Build files - serve uncompressed files
    location /Build/ {
        add_header Access-Control-Allow-Origin "*";
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ =404;
    }

    # Serve uncompressed files in Build directory
    location ~* /Build/.*\.js$ {
        add_header Content-Type "application/javascript; charset=utf-8";      
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "no-cache, no-store, must-revalidate";       
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location ~* /Build/.*\.wasm$ {
        add_header Content-Type "application/wasm";
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "no-cache, no-store, must-revalidate";       
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location ~* /Build/.*\.data$ {
        add_header Content-Type "application/octet-stream";
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "no-cache, no-store, must-revalidate";       
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }


    # StreamingAssets
    location /StreamingAssets/ {
        add_header Access-Control-Allow-Origin "*";
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Error pages
    error_page 404 /index.html;
}

